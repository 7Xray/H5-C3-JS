<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVA_BoxTest_fixed</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    section[class^="section"] {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .section1 {
      background: url(./img_EVA/eye_eva.png) no-repeat center center/cover fixed;
    }

    .section2 {
      background: url(./img_EVA/A_KONAKA_20250208.jpg) no-repeat center center/cover fixed;
    }

    .section3 {
      background: url(./img_EVA/top_eva.png) no-repeat center center/cover fixed;
    }

    .section4 {
      background: url(./img_EVA/ad_eva.png) no-repeat center center/cover fixed;
    }

    .textpart {
      width: 100%;
      height: 25%;
      background-color: rgba(0, 0, 0, 0.65);
      color: #fff;
      line-height: 30px;
      padding: 20px;
      font-size: 16px;
    }

    section[class^="section"] h2 {
      font-size: 50px;
      font-weight: 700;
      text-align: center;
      margin-top: 20px;
      letter-spacing: 30px;
      color: #fff;
    }
  </style>
</head>

<body>
  <!-- 第一屏 -->
  <section class="section1">
    <div class="textpart">
      <p>QWERTYUIOP</p>
      <p>ASDFGHJKLSJKL;DJKL;</p>

    </div>
