  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    a {
      text-decoration: none;
      color: #000;
    }

    ol,
    ul {
      list-style: none;
    }

    .TB_nav {
      width: 256px;
      height: 400px;
      background-color: #f7f7f7;
      border-radius: 12px;
      margin: 100px auto;
    }

    .nav_title {
      height: 40px;
      padding: 8px 0 0 16px;
      font-size: 16px;
      line-height: 32px;
      font-weight: 600;
    }

    .nav_title img {
      width: 60px;
      height: 20px;
      margin-left: 10px;
    }

    .nav_list li {
      height: 32px;
      line-height: 32px;
      margin: 0 8px;
      border-radius: 4px;
      transition: all .3s;
    }

    .nav_list li:hover {
      background-color: #fff;
    }

    .nav_list li a {
      font-size: 14px;
    }

    .nav_list li a:hover {
      color: #ff5000;
    }
  </style>
</head>
