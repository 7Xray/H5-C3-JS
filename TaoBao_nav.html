<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      color: rgb(115, 0, 255);
    }
  </style>
  <!-- 外部样式表改变所有标签部分,写到外部css文件中 -->
  <link rel="stylesheet" href="./CSS/MyStyle.css">
  </style>
</head>

<body>
  <!-- 内联样式只改变当前标签部分 -->
  <p style="color: rgb(0, 149, 255);">这是一个有色彩的段落</p>
  <!-- 内部样式表改变所有标签部分,写到head标签下的style标签中 -->
  <div>NIHAO</div>
  <!-- 外部样式表改变所有标签部分,写到外部css文件中 -->
  <span>嘻嘻</span>
</body>

</html>
